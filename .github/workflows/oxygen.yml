# Don't change the line below!
#! oxygen_storefront_id: 1000013955

name: Storefront 1000013955
on: [push]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Oxygen
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Fix vite version
        run: pnpm add vite@5.4.0 --save-exact

      - name: Build and Publish to Oxygen
        run: |
          npx shopify hydrogen deploy --auth-bypass-token --force --token "${{ secrets.OXYGEN_DEPLOYMENT_TOKEN_1000013955 }}"
